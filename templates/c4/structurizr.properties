# Structurizr local configuration for this workspace.
# See https://docs.structurizr.com/local/configuration

# Refresh browser diagrams automatically when workspace.dsl or included files change.
structurizr.autoRefreshInterval=2000

# Keep UI layout edits; Structurizr local writes them to workspace.json.
structurizr.autoSaveInterval=5000

# Diagrams remain editable in local mode so layout can be curated manually.
structurizr.editable=true
